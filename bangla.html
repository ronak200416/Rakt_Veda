<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>রক্ত বেদ - রক্ত পরীক্ষা বিশ্লেষণ</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

    <style>
        :root {
            --primary: #ff4757;
            --primary-dark: #e84118;
            --accent: #70a1ff;
            --light: #f1f2f6;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-dark: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Hind Siliguri', 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            overflow: hidden;
            direction: ltr;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .header {
            padding: 1.2rem 2rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            position: relative;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .header h1 i {
            color: var(--primary);
            margin-right: 14px;
            font-size: 2.4rem;
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            margin-top: 4px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0 1.5rem;
            min-height: 0;
        }

        #response {
            flex: 1;
            padding: 1.5rem 0.5rem 0.5rem 0.5rem;
            overflow-y: auto;
            direction: ltr;
            text-align: left;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        #response::-webkit-scrollbar {
            width: 5px;
        }

        #response::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 10px;
        }

        .response-card {
            background: rgba(255, 255, 255, 0.07);
            border-left: 4px solid var(--accent);
            padding: 1rem 1.2rem;
            border-radius: 0 12px 12px 0;
            margin-bottom: 0.8rem;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease-out;
            transition: all 0.3s ease;
            text-align: left;
            max-width: 95%;
        }

        .response-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(4px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .response-card h3 {
            color: white;
            margin-bottom: 0.3rem;
            font-size: 1.1rem;
        }

        .response-card p {
            color: rgba(255, 255, 255, 0.92);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .response-card pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: rgba(0, 0, 0, 0.25);
            padding: 0.8rem;
            border-radius: 8px;
            margin-top: 0.4rem;
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .response-card strong {
            color: white;
        }

        .user-message {
            border-left-color: var(--primary);
            background: rgba(255, 71, 87, 0.1);
            margin-left: auto;
            max-width: 85%;
        }

        .bot-message {
            border-left-color: var(--accent);
            margin-right: auto;
            max-width: 95%;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0.8rem 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
            gap: 12px;
        }

        .loading-spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 107, 129, 0.15);
            border-left: 4px solid var(--danger);
            padding: 0.8rem 1.2rem;
            border-radius: 0 12px 12px 0;
            color: #ff6b81;
            margin-bottom: 0.8rem;
            animation: shake 0.4s ease;
            font-size: 0.95rem;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%, 75% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
        }

        .error-message i {
            margin-right: 8px;
        }

        .input-area {
            padding: 1rem 0.5rem 1.2rem 0.5rem;
            background: rgba(0, 0, 0, 0.25);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .upload-group {
            padding: 0.6rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 0.8rem;
            border: 1.5px dashed rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .upload-group:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .upload-group label {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .file-input-wrapper {
            position: relative;
            flex: 1;
            min-width: 120px;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.4rem 1.2rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
            font-weight: 400;
            transition: all 0.3s ease;
            gap: 8px;
            white-space: nowrap;
        }

        .file-input-label:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .file-input-label i {
            font-size: 1rem;
        }

        .input-wrapper {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        #userInput {
            flex: 1;
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-family: 'Hind Siliguri', sans-serif;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            min-width: 0;
        }

        #userInput::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #userInput:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.14);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.15);
        }

        #askButton {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0.7rem 1.6rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Hind Siliguri', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.25);
            white-space: nowrap;
        }

        #askButton:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.35);
        }

        #askButton:active {
            transform: translateY(0);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .header h1 i {
                font-size: 1.8rem;
            }
            .header p {
                font-size: 0.85rem;
            }
            .header {
                padding: 0.8rem 1rem;
            }
            .chat-area {
                padding: 0 0.8rem;
            }
            #response {
                padding: 1rem 0.3rem 0.3rem 0.3rem;
            }
            .response-card {
                padding: 0.8rem 1rem;
                max-width: 98%;
            }
            .input-area {
                padding: 0.6rem 0.3rem 0.8rem 0.3rem;
            }
            .upload-group {
                padding: 0.5rem 0.8rem;
                flex-wrap: wrap;
            }
            .input-wrapper {
                flex-direction: column;
                gap: 0.5rem;
            }
            #askButton {
                width: 100%;
                justify-content: center;
                padding: 0.6rem;
            }
            #userInput {
                width: 100%;
            }
            .file-input-label {
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }
            .upload-group label {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.6rem;
            }
            .header h1 i {
                font-size: 1.4rem;
                margin-right: 8px;
            }
            .header p {
                font-size: 0.75rem;
            }
            .response-card {
                font-size: 0.85rem;
                padding: 0.6rem 0.8rem;
            }
            .response-card p {
                font-size: 0.85rem;
                line-height: 1.5;
            }
            #userInput {
                font-size: 0.85rem;
                padding: 0.6rem 1rem;
            }
            #askButton {
                font-size: 0.85rem;
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="app-container">
        <div class="header">
            <h1><i class=""></i> রক্ত বেদ</h1>
            <p>আপনার রিপোর্ট টেক্সট বা ইমেজ থেকে আপলোড করুন এবং বিশ্লেষণ পান</p>
        </div>

        <div class="chat-area">
            <div id="response">
                <div class="response-card bot-message">
                    <h3>🩸 স্বাগতম</h3>
                    <p>আপনার রক্ত পরীক্ষার মান ম্যানুয়ালি প্রবেশ করান অথবা রিপোর্টের ছবি আপলোড করুন।</p>
                </div>
            </div>

            <div class="input-area">
                <div class="upload-group">
                    <label for="imageUpload">
                        <i class="fas fa-file-image"></i> ইমেজ আপলোড
                    </label>
                    <div class="file-input-wrapper">
                        <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload()"/>
                        <label for="imageUpload" class="file-input-label">
                            <i class="fas fa-cloud-upload-alt"></i> <span id="fileName">ফাইল নির্বাচন করুন</span>
                        </label>
                    </div>
                </div>

                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="যেমন: Hemoglobin 14.5, WBC 7500, Platelets 250000..." onkeypress="handleKeyPress(event)" />
                    <button id="askButton" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i> বিশ্লেষণ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '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';
        const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        
        const MODELS = [
            'llama-3.3-70b-versatile',
            'llama-3.1-8b-instant',
            'gemma2-9b-it'
        ];
        
        let currentModelIndex = 0;

        function createParticles() {
            const container = document.getElementById('particles');
            const count = 25;
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.bottom = `-${size}px`;
                particle.style.animationDuration = `${Math.random() * 15 + 10}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                particle.style.opacity = Math.random() * 0.3 + 0.05;
                container.appendChild(particle);
            }
        }
        
        window.onload = createParticles;

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput').value.trim();
            if (!input) {
                addError('⚠️ অনুগ্রহ করে কিছু টেক্সট প্রবেশ করান।');
                return;
            }

            addUserMessage(input);
            showLoading('🔄 বিশ্লেষণ করা হচ্ছে...');
            document.getElementById('userInput').value = '';

            try {
                let success = false;
                let lastError = null;

                for (let i = 0; i < MODELS.length; i++) {
                    const model = MODELS[i];
                    try {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${API_KEY}`,
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                model: model,
                                messages: [
                                    { 
                                        role: 'system', 
                                        content: 'You are a professional medical assistant. Respond ONLY in Bengali (বাংলা). Provide detailed blood test analysis. Identify abnormalities and suggest precautions. Be helpful, accurate, and structured.' 
                                    }, 
                                    { 
                                        role: 'user', 
                                        content: `নিচের রক্ত পরীক্ষার রিপোর্ট বিশ্লেষণ করুন এবং বাংলায় বিস্তারিত ফলাফল দিন:\n\n${input}\n\nঅনুগ্রহ করে অস্বাভাবিকতা চিহ্নিত করুন এবং সতর্কতা সুপারিশ করুন।` 
                                    }
                                ],
                                temperature: 0.7,
                                max_tokens: 1000
                            }),
                        });

                        if (response.ok) {
                            const data = await response.json();
                            removeLoading();
                            if (data.choices?.[0]?.message?.content) {
                                addBotMessage(`✅ **বিশ্লেষণ সম্পূর্ণ**\n\n${data.choices[0].message.content}`);
                                success = true;
                                currentModelIndex = i;
                                break;
                            }
                        } else {
                            const errorData = await response.json();
                            lastError = errorData.error?.message || response.statusText;
                            if (lastError.includes('decommissioned') || lastError.includes('not found')) {
                                continue;
                            } else {
                                throw new Error(lastError);
                            }
                        }
                    } catch (err) {
                        lastError = err.message;
                    }
                }

                if (!success) {
                    removeLoading();
                    addError(`❌ বিশ্লেষণ ব্যর্থ: ${lastError || 'অজ্ঞাত ত্রুটি'}`);
                }
            } catch (err) {
                removeLoading();
                addError(`❌ ত্রুটি: ${err.message}`);
            }
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'response-card user-message';
            div.innerHTML = `<strong>👤 আপনি:</strong> ${text}`;
            document.getElementById('response').appendChild(div);
            scrollToBottom();
        }

        function addBotMessage(text) {
            const div = document.createElement('div');
            div.className = 'response-card bot-message';
            div.innerHTML = `<strong>🧬 বিশ্লেষণ:</strong><br>${marked.parse(text)}`;
            document.getElementById('response').appendChild(div);
            scrollToBottom();
        }

        function addError(message) {
            const div = document.createElement('div');
            div.className = 'error-message';
            div.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            document.getElementById('response').appendChild(div);
            scrollToBottom();
        }

        function showLoading(text) {
            removeLoading();
            const div = document.createElement('div');
            div.className = 'loading';
            div.id = 'loading';
            div.innerHTML = `<div class="loading-spinner"></div> ${text}`;
            document.getElementById('response').appendChild(div);
            scrollToBottom();
        }

        function removeLoading() {
            const el = document.getElementById('loading');
            if (el) el.remove();
        }

        function scrollToBottom() {
            const el = document.getElementById('response');
            el.scrollTop = el.scrollHeight;
        }

        async function handleImageUpload() {
            const input = document.getElementById('imageUpload');
            const file = input.files?.[0];
            if (!file) return;

            document.getElementById('fileName').textContent = file.name.length > 25 ? file.name.slice(0, 22) + '...' : file.name;

            showLoading('📸 রিপোর্ট পড়া হচ্ছে...');

            try {
                const result = await Tesseract.recognize(file, 'eng+hin', {
                    logger: m => console.log(m)
                });

                removeLoading();

                const text = result.data.text.trim();
                if (!text) {
                    addError('❌ কোনো টেক্সট পাওয়া যায়নি। স্পষ্ট ছবি আপলোড করুন।');
                    resetFileInput();
                    return;
                }

                await analyzeExtractedText(text);
            } catch (err) {
                removeLoading();
                addError(`❌ OCR ত্রুটি: ${err.message}`);
                resetFileInput();
            }
        }

        async function analyzeExtractedText(text) {
            showLoading('🔄 বিশ্লেষণ করা হচ্ছে...');

            try {
                let success = false;
                let lastError = null;

                for (let i = 0; i < MODELS.length; i++) {
                    const model = MODELS[i];
                    try {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${API_KEY}`,
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                model: model,
                                messages: [
                                    {
                                        role: 'system',
                                        content: 'You are a professional medical assistant. Respond ONLY in Bengali (বাংলা). Provide detailed blood test analysis. Identify abnormalities and suggest precautions.'
                                    },
                                    {
                                        role: 'user',
                                        content: `এই রক্ত পরীক্ষার রিপোর্ট, বিশ্লেষণ করুন:\n\n${text}\n\nঅস্বাভাবিকতা এবং সতর্কতা সুপারিশ করুন।`
                                    }
                                ],
                                temperature: 0.7,
                                max_tokens: 1000
                            }),
                        });

                        if (response.ok) {
                            const data = await response.json();
                            removeLoading();
                            if (data.choices?.[0]?.message?.content) {
                                addBotMessage(`✅ **বিশ্লেষণ সম্পূর্ণ**\n\n${data.choices[0].message.content}`);
                                success = true;
                                currentModelIndex = i;
                                break;
                            }
                        } else {
                            const errorData = await response.json();
                            lastError = errorData.error?.message || response.statusText;
                            if (lastError.includes('decommissioned') || lastError.includes('not found')) {
                                continue;
                            } else {
                                throw new Error(lastError);
                            }
                        }
                    } catch (err) {
                        lastError = err.message;
                    }
                }

                if (!success) {
                    removeLoading();
                    addError(`❌ বিশ্লেষণ ব্যর্থ: ${lastError || 'অজ্ঞাত ত্রুটি'}`);
                }
                
                resetFileInput();
            } catch (err) {
                removeLoading();
                addError(`❌ ত্রুটি: ${err.message}`);
                resetFileInput();
            }
        }

        function resetFileInput() {
            document.getElementById('imageUpload').value = '';
            document.getElementById('fileName').textContent = 'ফাইল নির্বাচন করুন';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rakt Veda - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #ff4757;
            --primary-dark: #e84118;
            --accent: #70a1ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Hind Siliguri', 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .login-content {
            width: 100%;
            max-width: 420px;
            padding: 0.5rem 0;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .header h1 i {
            color: var(--primary);
            margin-right: 10px;
            font-size: 2.4rem;
        }

        .header h1 span {
            color: var(--primary);
        }

        .header p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            margin-top: 4px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .header .divider {
            width: 50px;
            height: 3px;
            background: var(--primary);
            margin: 12px auto 0;
            border-radius: 2px;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        .form-group label i {
            margin-right: 8px;
            color: var(--primary);
            width: 18px;
        }

        .form-control {
            width: 100%;
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 30px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.06);
            color: white;
            font-family: 'Hind Siliguri', sans-serif;
            transition: all 0.3s ease;
            border: 1.5px solid rgba(255, 255, 255, 0.06);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 71, 87, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        .password-toggle:hover {
            color: white;
        }

        /* ===== LANGUAGE SELECTOR ===== */
        .language-selector {
            margin-bottom: 1.2rem;
        }

        .language-selector .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .language-selector .label-row label {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        .language-selector .label-row label i {
            margin-right: 8px;
            color: var(--primary);
            width: 18px;
        }

        .language-selector .label-row .selected-lang {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.15rem 0.7rem;
            border-radius: 12px;
        }

        .language-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .language-option {
            position: relative;
        }

        .language-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .language-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0.2rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.75rem;
            border: 1.5px solid rgba(255, 255, 255, 0.04);
            min-height: 52px;
            color: rgba(255, 255, 255, 0.5);
        }

        .language-option label:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .language-option input:checked + label {
            background: rgba(255, 71, 87, 0.12);
            border-color: var(--primary);
            color: white;
        }

        .language-option i {
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .language-option input:checked + label i {
            color: var(--primary);
        }

        /* ===== BUTTON ===== */
        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Hind Siliguri', sans-serif;
            box-shadow: 0 4px 25px rgba(255, 71, 87, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 0.2rem;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(255, 71, 87, 0.35);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ===== ERROR ===== */
        .error-message {
            background: rgba(255, 107, 129, 0.1);
            border-left: 4px solid #ff6b81;
            padding: 0.6rem 1rem;
            border-radius: 0 10px 10px 0;
            color: #ff6b81;
            margin-bottom: 1rem;
            display: none;
            animation: shake 0.4s ease;
            font-size: 0.85rem;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%, 75% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
        }

        .error-message i {
            margin-right: 8px;
        }

        /* ===== FOOTER ===== */
        .footer {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.4rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .footer a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer a:hover {
            color: var(--accent);
        }

        .footer a i {
            font-size: 0.75rem;
        }

        /* ===== PARTICLES ===== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .app-container {
                padding: 1rem;
            }

            .login-content {
                max-width: 100%;
            }

            .header h1 {
                font-size: 2.2rem;
            }

            .header h1 i {
                font-size: 1.8rem;
            }

            .header p {
                font-size: 0.8rem;
            }

            .form-control {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }

            .language-options {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.4rem;
            }

            .language-option label {
                font-size: 0.7rem;
                min-height: 44px;
                padding: 0.3rem 0.2rem;
                border-radius: 10px;
            }

            .language-option i {
                font-size: 1rem;
            }

            .footer {
                gap: 1.2rem;
                flex-wrap: wrap;
            }

            .footer a {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 380px) {
            .app-container {
                padding: 0.8rem;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .header h1 i {
                font-size: 1.5rem;
            }

            .language-options {
                grid-template-columns: repeat(2, 1fr);
            }

            .submit-btn {
                font-size: 0.9rem;
                padding: 0.65rem;
            }
        }

        @media (max-height: 700px) {
            .header {
                margin-bottom: 1.2rem;
            }

            .header h1 {
                font-size: 2.2rem;
            }

            .form-group {
                margin-bottom: 0.7rem;
            }

            .language-selector {
                margin-bottom: 0.8rem;
            }

            .language-option label {
                min-height: 42px;
                padding: 0.3rem 0.2rem;
            }

            .footer {
                margin-top: 1rem;
                padding-top: 0.8rem;
            }
        }

        @media (max-height: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header h1 i {
                font-size: 1.5rem;
            }

            .header p {
                font-size: 0.75rem;
            }

            .header .divider {
                margin-top: 8px;
                width: 40px;
            }

            .form-control {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }

            .language-option label {
                min-height: 36px;
                font-size: 0.65rem;
            }

            .language-option i {
                font-size: 0.9rem;
            }

            .submit-btn {
                padding: 0.6rem;
                font-size: 0.9rem;
            }

            .footer a {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <!-- ===== PARTICLES ===== -->
    <div class="particles" id="particles"></div>

    <!-- ===== FULL SCREEN APP ===== -->
    <div class="app-container">
        <div class="login-content">

            <!-- HEADER -->
            <div class="header">
                <h1><i class="fas fa-flask"></i>Rakt <span>Veda</span></h1>
                <p>Sign in to continue</p>
                <div class="divider"></div>
            </div>

            <!-- ERROR -->
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i> Invalid username or password
            </div>

            <!-- FORM -->
            <form id="loginForm">

                <!-- Username -->
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>

                <!-- Language Selector -->
                <div class="language-selector">
                    <div class="label-row">
                        <label><i class="fas fa-language"></i> Select Language</label>
                        <span class="selected-lang" id="selectedLangDisplay">অসমীয়া</span>
                    </div>
                    <div class="language-options">
                        <div class="language-option">
                            <input type="radio" id="hindi" name="language" value="hindi">
                            <label for="hindi">
                                <i class="fas fa-om"></i>
                                हिन्दी
                            </label>
                        </div>
                        <div class="language-option">
                            <input type="radio" id="marathi" name="language" value="marathi">
                            <label for="marathi">
                                <i class="fas fa-om"></i>
                                मराठी
                            </label>
                        </div>
                        <div class="language-option">
                            <input type="radio" id="bangla" name="language" value="bangla">
                            <label for="bangla">
                                <i class="fas fa-star-and-crescent"></i>
                                বাংলা
                            </label>
                        </div>
                        <div class="language-option">
                            <input type="radio" id="axomiya" name="language" value="axomiya" checked>
                            <label for="axomiya">
                                <i class="fas fa-praying-hands"></i>
                                অসমীয়া
                            </label>
                        </div>
                        <div class="language-option">
                            <input type="radio" id="gujrati" name="language" value="gujrati">
                            <label for="gujrati">
                                <i class="fas fa-yin-yang"></i>
                                ગુજરાતી
                            </label>
                        </div>
                        <div class="language-option">
                            <input type="radio" id="punjabi" name="language" value="punjabi">
                            <label for="punjabi">
                                <i class="fas fa-kaaba"></i>
                                ਪੰਜਾਬੀ
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <!-- FOOTER -->
            <div class="footer">
                <a href="#" id="registerLink"><i class="fas fa-user-plus"></i> Register</a>
                <a href="#" id="forgotPassword"><i class="fas fa-key"></i> Forgot password?</a>
            </div>

        </div>
    </div>

    <script>
        // ===== PARTICLES =====
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 30;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-' + size + 'px';
                particle.style.animationDuration = (Math.random() * 18 + 12) + 's';
                particle.style.animationDelay = (Math.random() * 6) + 's';
                particle.style.opacity = Math.random() * 0.3 + 0.05;
                container.appendChild(particle);
            }
        }
        window.onload = createParticles;

        // ===== PASSWORD TOGGLE =====
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            } else {
                pwd.type = 'password';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            }
        });

        // ===== LANGUAGE DISPLAY =====
        const langNames = {
            hindi: 'हिन्दी',
            marathi: 'मराठी',
            bangla: 'বাংলা',
            axomiya: 'অসমীয়া',
            gujrati: 'ગુજરાતી',
            punjabi: 'ਪੰਜਾਬੀ'
        };

        document.querySelectorAll('input[name="language"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('selectedLangDisplay').textContent = langNames[this.value] || this.value;
            });
        });

        // ===== FORM SUBMIT =====
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const selected = document.querySelector('input[name="language"]:checked');
            const errorEl = document.getElementById('errorMessage');

            errorEl.style.display = 'none';

            if (!selected) {
                errorEl.textContent = '⚠️ Please select a language.';
                errorEl.style.display = 'block';
                return;
            }

            const lang = selected.value;

            if (username === "Ronak@123" && password === "I_LOVE_PCU") {
                window.location.href = lang + '.html';
            } else {
                errorEl.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // ===== FOOTER LINKS =====
        document.getElementById('registerLink').addEventListener('click', function(e) {
            e.preventDefault();
            alert('📝 Registration coming soon!');
        });

        document.getElementById('forgotPassword').addEventListener('click', function(e) {
            e.preventDefault();
            alert('🔑 Password recovery coming soon!');
        });
    </script>
</body>
</html>
